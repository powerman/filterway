name: Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel testing of a previous commit for the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # To update gh-badges branch.

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
      - run: git reset --hard # Work around https://github.com/jdx/mise/discussions/8270.

      - uses: Swatinem/rust-cache@v2

      - run: mise run ci

      # Run tests with coverage (on main only) for the badge below.
      - run: mise run cover:rust
        if: github.ref_name == 'main'

      - uses: powerman/.github/.github/actions/coverage-badge@main
        if: github.ref_name == 'main'
        with:
          total_cmd: "mise run -q cover:rust:total"

  # Testing on available native platforms.
  native:
    strategy:
      matrix:
        include:
          - {os: ubuntu-24.04-arm} # Linux ARM64
          - {os: macos-15-intel} # macOS AMD64
          - {os: macos-latest} # macOS ARM64
          - {os: windows-latest} # Windows AMD64
          - {os: windows-11-arm} # Windows ARM64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly

      - run: cargo test --workspace

  # Testing on available docker QEMU platforms (Linux only).
  qemu:
    strategy:
      matrix:
        include:
          - {arch: arm, v: v7}
          - {arch: ppc64le}
          - {arch: s390x}
          - {arch: riscv64}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.arch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run tests
        env:
          PLATFORM: linux/${{ matrix.arch }}${{ matrix.v && format('/{0}', matrix.v) || '' }}
        run: |
          docker run -i --rm --platform "$PLATFORM" \
            -w /workspace \
            -v "$PWD:/workspace" \
            -v "$HOME/.cargo/registry:/usr/local/cargo/registry" \
            -e CARGO_HOME=/usr/local/cargo \
            rust:nightly-slim \
            cargo test --workspace

  # Aggregate job for branch protection.
  test:
    needs: [main, native, qemu]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Fail if any dependency failed, cancelled or skipped
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1
